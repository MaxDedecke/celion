version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # prevent node_modules from being overwritten by the volume mount
    depends_on:
      - api
    networks:
      - celion-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - webapp # wait for webapp to be somewhat ready
    networks:
      - celion-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - celion-net

networks:
  celion-net:
    driver: bridge
