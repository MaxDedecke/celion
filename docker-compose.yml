x-postgres-config: &postgres-config
  POSTGRES_DB: ${POSTGRES_DB:-celion}
  POSTGRES_USER: ${POSTGRES_USER:-celion}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-celion}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
      - .env.local
    volumes:
      - .:/app
      - webapp_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - celion-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-celion}:${POSTGRES_PASSWORD:-celion}@postgres-db:5432/${POSTGRES_DB:-celion}"
      INTERNAL_BACKEND_URL: "http://backend:8000"
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-celion}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-celion}
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - celion-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.local
    environment:
      <<: *postgres-config
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-celion}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-celion}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    volumes:
      - .:/app
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - celion-net

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-celion}
      POSTGRES_USER: ${POSTGRES_USER:-celion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-celion}
    ports:
      - "5432:5432"
    volumes:
      - celion_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celion -d celion"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - celion-net

  neo4j-db:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - celion_neo4j_data:/data
    networks:
      - celion-net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: ${POSTGRES_HOST:-postgres-db}
      # Empfehlung: Eigene DB für Keycloak nutzen, um Konflikte mit App-Tabellen zu vermeiden
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-celion}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-celion}
    ports:
      - "8888:8080"
    volumes:
      - ./celion-realm.json:/opt/keycloak/data/import/celion-realm.json
    command: ["start-dev", "--import-realm"]
    networks:
      - celion-net
    depends_on:
      postgres-db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-celion}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-celion}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "is_running"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - celion-net

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - celion-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - celion-net

networks:
  celion-net:
    driver: bridge

volumes:
  webapp_node_modules:
  worker_node_modules:
  celion_postgres_data:
  portainer_data:
  celion_neo4j_data:
  rabbitmq_data:
  ollama_data:
