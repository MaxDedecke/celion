version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app # Mount app source
      - webapp_node_modules:/app/node_modules # Use a named volume for node_modules
    depends_on:
      - api
    networks:
      - celion-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    volumes:
      - .:/app # Mount app source
      - worker_node_modules:/app/node_modules # Use a named volume for node_modules
    depends_on:
      - webapp # wait for webapp to be somewhat ready
    networks:
      - celion-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - celion-net

networks:
  celion-net:
    driver: bridge

volumes:
  webapp_node_modules:
  worker_node_modules:
