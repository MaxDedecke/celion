version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app # Mount app source
      - webapp_node_modules:/app/node_modules # Use a named volume for node_modules
    depends_on:
      - api
    networks:
      - celion-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    volumes:
      - .:/app # Mount app source
      - worker_node_modules:/app/node_modules # Use a named volume for node_modules
    depends_on:
      - webapp # wait for webapp to be somewhat ready
    networks:
      - celion-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DB: celion
      POSTGRES_USER: celion
      POSTGRES_PASSWORD: celion
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - celion-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: celion
      POSTGRES_USER: celion
      POSTGRES_PASSWORD: celion
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - celion-net

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - celion-net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8888:8080" # Avoid conflict with webapp on 8080
    networks:
      - celion-net

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - celion-net

networks:
  celion-net:
    driver: bridge

volumes:
  webapp_node_modules:
  worker_node_modules:
  db_data:
  portainer_data:
  neo4j_data: